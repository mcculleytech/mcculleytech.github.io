{{ define "main" }}
  <article class="micro-entry micro-entry--single">
    <div class="micro-entry__meta">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
        {{ .Date.Format "2006-01-02 15:04" }}
      </time>
    </div>
    {{ with .Title }}
      <h1 class="micro-entry__title">{{ . | markdownify }}</h1>
    {{ end }}
    <div class="micro-entry__content">
      {{ .Content }}
    </div>
  </article>
  <div class="micro-entry__nav">
    <a href="{{ "/micro/" | relURL }}">← all notes</a>
  </div>
{{ end }}
