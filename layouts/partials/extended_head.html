<style>
/* Tennessee-flag palette — TN navy canvas, TN red accent, Old-Glory blue secondary */
html:root {
  /* Theme-required hooks (re-terminal expects these) */
  --accent: #C8102E;
  --background: #0A2D5C;
  --color: #e8e8e8;
  --menu-color: #e8e8e8;
  --border-color: rgba(255, 255, 255, 0.1);

  /* Brand red — three shades */
  --tp-accent: #C8102E;
  --tp-accent-deep: #8E0A1F;
  --tp-accent-soft: rgba(200, 16, 46, 0.12);

  /* Brand blue — three shades, feature-emphasis */
  --tp-accent-blue: #2C5AA0;
  --tp-accent-blue-deep: #1B3D75;
  --tp-accent-blue-soft: rgba(44, 90, 160, 0.12);

  /* Canvas — TN navy family */
  --tp-bg: #0A2D5C;
  --tp-bg-secondary: #143A6E;
  --tp-bg-header: #061F40;
  --tp-bg-elevated: #1B4A85;
  --tp-divider: #2A4675;
}

#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var canvas = document.createElement('canvas');
  canvas.id = 'particles';
  document.body.appendChild(canvas);
  var ctx = canvas.getContext('2d');
  var particles = [];
  var count = 60;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      o: Math.random() * 0.4 + 0.1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + p.o + ')';
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    }
    requestAnimationFrame(draw);
  }
  draw();
});
</script>
