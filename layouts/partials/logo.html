<a href="{{ if $.Site.Params.Logo.LogoHomeLink }}{{ $.Site.Params.Logo.LogoHomeLink }}{{else}}{{ $.Site.BaseURL }}{{ end }}">
  <div class="logo">
    <img src="/img/trashpanda_logo.svg" alt="{{ $.Site.Title }}" class="logo__img" />
    {{ with $.Site.Params.Logo.logoText }}<span class="logo__text">{{ . }}</span>{{ end }}
  </div>
</a>
